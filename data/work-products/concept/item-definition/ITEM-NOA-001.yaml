base:
  purpose: >-
    定义 L2 级 NOA（导航领航辅助）：针对高速和封闭道路（I 型道路）的组合驾驶辅助（2 级驾驶自动化，GB/T 40429-2021 对齐），
    在导航与高精/车道级路线约束下于限定 ODD 内提供纵向与横向组合驾驶辅助；能力范围与《NOA简介》一致时包括：
    自动上下匝道、车道内自适应巡航、横向车道保持、换道辅助及驾驶员触发/确认换道、自动换道等（以项目 SSTS/PRD 冻结为准）。
    本文档作为 HARA、FSC 及（如适用）SOTIF 工作的上游输入。
  scope_boundary:
    system_function_boundary:
      - 目标道路类型包含高速和封闭道路（I 型道路）等《NOA简介》所述范围；具体地理围栏与道路等级以 ODD-NOA-001 冻结为准
      - L2 组合驾驶辅助：持续执行动态驾驶任务中的车辆横向与纵向运动控制，驾驶员承担监控职责并随时准备接管（GB/T 40429-2021 2 级定义对齐）
      - NOA 在限定 ODD 内利用导航路线、地图/定位与环境感知，完成自动上下匝道、车道内自适应巡航、车道保持及驾驶员触发/确认换道、自动换道等能力（以项目功能清单与《NOA简介》功能划分对齐）
      - 包含 NOA 状态机、ODD 约束、提示报警与降级/退出策略及对执行层的控制请求/轨迹目标输出；不包含底层执行器闭环细节（若由底盘域实现）
    v_model_stage:
      - 概念
  inputs_references:
    - id: PRD-NOA-L2-001
      name: L2 NOA 功能需求（导航领航辅助）
      version: v0.2
