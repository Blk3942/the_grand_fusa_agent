content:
  item_overview:
    item_name: 雨刮器系统（Wiper System）
    functional_objective: 在雨/雪/飞溅等影响风挡透明度的情况下，通过雨刮控制提升驾驶员视野；支持手动控制与可选自动控制，并在故障时提供可用的降级/提示策略。
    non_safety_objectives:
      - 提升自动雨刮舒适性与可接受性（避免频繁抖动/误触发）
      - 降低噪声与电机负载，提升寿命
  boundary_interfaces:
    in_scope:
      - 雨刮模式控制（OFF/间歇/低速/高速/单次刮拭）
      - 自动雨刮控制（若配备雨量传感器）
      - 对雨刮电机/驱动输出控制请求（占空比/速度档位等，按架构）
      - 故障检测（堵转、过流、欠压、通信异常）与降级策略（限速/停止/提示）
    out_of_scope:
      - 雨刮臂/刮片机械结构设计
      - 玻璃加热除霜策略（若有则另行界定）
    interfaces:
      - id: IF-WIPER-001
        object: 组合开关/雨刮控制输入（柱开关/触控）
        direction: 输入
        signal: 模式选择、间歇档位、单次刮拭指令
        normal_range: 输入信号有效且去抖满足规格
        abnormal_handling: 输入异常时保持当前状态或进入安全降级（待定）
      - id: IF-WIPER-002
        object: 雨量传感器（可选）
        direction: 输入
        signal: 雨量等级、有效位/置信度
        normal_range: 输出周期与有效位满足自动控制需求
        abnormal_handling: 传感器无效时退出自动模式并提示（待定）
      - id: IF-WIPER-003
        object: 车辆状态总线（CAN/Ethernet）
        direction: 输入
        signal: 车速、点火状态、雨刮系统诊断信息、供电状态
        normal_range: 信号周期与质量位有效
        abnormal_handling: 关键状态丢失时进入保守策略（待定）
      - id: IF-WIPER-004
        object: 雨刮电机/驱动模块（BCM/驱动器）
        direction: 输出
        signal: 速度档位/控制请求、使能/禁用
        normal_range: 执行并反馈状态（如过流/堵转）
        abnormal_handling: 执行异常时降级并提示（待定）
      - id: IF-WIPER-005
        object: HMI/仪表
        direction: 输出
        signal: 自动模式指示、故障提示、降级提示
        normal_range: 告警通路可用且优先级正确
        abnormal_handling: HMI 不可用时按项目定义处理（待定）
  operating_scenarios:
    - id: SCN-WIPER-001
      description: 小雨/飞溅，手动间歇雨刮
      conditions: 城市道路，低中车速，轻度降雨或溅水
      driver_state: 正常驾驶
      note: 基线场景
    - id: SCN-WIPER-002
      description: 大雨高速行驶，雨刮高速模式
      conditions: 高速道路，80-120 km/h，强降雨
      driver_state: 需要持续视野
      note: 关键安全场景
    - id: SCN-WIPER-003
      description: 夜间大雨或对向车灯反射，视野需求更高
      conditions: 夜间，强降雨，眩光
      driver_state: 视野受限风险上升
      note: 严重度可能更高
    - id: SCN-WIPER-004
      description: 自动雨刮边界工况（雾、毛毛雨、泥水飞溅）
      conditions: 能见度变化快，雨量传感器易误判
      driver_state: 可能频繁调整
      note: 与 SOTIF 边界相关
  dependencies_constraints:
    - id: DEP-WIPER-001
      dependency: 供电与驱动能力
      constraint: 欠压/低温下仍能满足最低刮拭能力或触发降级提示
      impact_if_failed: 雨刮停止导致视野受影响
    - id: DEP-WIPER-002
      dependency: 驾驶员输入与 HMI 提示
      constraint: 控制输入可靠，故障提示明确可理解
      impact_if_failed: 驾驶员无法及时采取补救措施
  known_failures_initial_concerns:
    - id: CON-WIPER-001
      concern: 雨刮在大雨高速工况停止/速度不足导致视野严重受限
      source: 评审/经验
      severity_preliminary: 待定
      downstream: 输入 HARA 危害事件
    - id: CON-WIPER-002
      concern: 自动雨刮误触发或不触发导致驾驶员分心或视野不足（边界与 SOTIF 相关）
      source: 评审
      severity_preliminary: 待定
      downstream: 输入 HARA / SOTIF
