    - 本文为 Item Definition 草案；ASIL（Automotive Safety Integrity Level，汽车安全完整性等级）仅在 HARA 中结合场景与证据判定。
    - 对「无故障但性能不足/误用」导致的风险，应在 ISO 21448（SOTIF）中单独分析并与 ISO 26262 malfunction 危害区分记录。
    - 法规条款号（如行业强标征求意见稿）仅作项目对齐参考，需以项目采纳的版本与官方发布文本为准。
