      - 覆盖 malfunction 引发的危害事件；对传感器性能边界与误用风险在 SOTIF 中补充
    v_model_stage:
      - 概念
  inputs_references:
    - id: ITEM-WIPER-001
      name: 雨刮器系统 Item Definition
      version: v0.1
      source: data/work-products/concept/item-definition/ITEM-WIPER-001.yaml
      note: 单一真源
  standard_requirements:
