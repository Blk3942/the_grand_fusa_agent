base:
  purpose: 基于 NOA Item Definition，在概念阶段识别危害事件并进行风险评估（S/E/C），提出安全目标（SG）并形成向 FSC 的追溯输入。
  scope_boundary:
    system_function_boundary:
      - 覆盖 NOA 在其 ODD 内的典型运行场景与边界场景
      - 覆盖失效引发的危害事件（malfunction-based）
    v_model_stage:
      - 概念
  inputs_references:
    - id: ITEM-NOA-001
      name: NOA Item Definition
      version: v0.1
      source: data/work-products/concept/item-definition/ITEM-NOA-001.yaml
      note: 单一真源
    - id: ODD-NOA-001
      name: NOA ODD 定义
      version: v0.1
      source: 系统需求/法规合规文档
      note: 待提供（影响 E/C 假设）
  standard_requirements:
    - standard: ISO 26262
      part_clause: Part 3（HARA）
      applicability: 危害识别、场景、危害事件、S/E/C 与安全目标
      evidence_ref: SYS-REV-NOA-HARA-001（计划）
  project_assumptions:
    - id: ASM-NOA-HARA-001
      assumption: 驾驶员在 NOA 激活期间保持“监督驾驶”并可在告警后合理时间接管（具体时间待定）
      impact: 可控性 C 的判定
      risk_if_invalid: C 低估导致 ASIL 低估
      verification: 驾驶员研究/试验数据与 HMI 设计确认
  traceability:
    - item_id: HARA-NOA-001
      upstream: ITEM-NOA-001
      downstream: FSC-NOA-001（待建）
      verification_method: 评审
      evidence_id: SYS-REV-NOA-HARA-001（计划）
  open_verification_items:
    - id: OVI-NOA-HARA-001
      item: S/E/C 标定所需的 ODD 场景统计与驾驶员可控性数据
      owner: 待定
      due: 待定
      status: Open
  review_approval:
    - role: 作者
      name: 系统安全工程师（待定）
      conclusion: N/A
      date: 2026-03-27
    - role: 评审者
