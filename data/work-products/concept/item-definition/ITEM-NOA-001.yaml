content:
  item_overview:
    item_name: L2 NOA（导航领航辅助，Navigation Pilot Assist）
    functional_objective: >-
      NOA 针对高速和封闭道路（I 型道路）的组合驾驶辅助功能（2 级驾驶自动化），主要为用户提供基于导航的驾驶辅助；
      主要包括自动上下匝道、纵向自适应巡航以及横向的车道保持、换道辅助和自动换道等服务（与《NOA简介》功能简介一致；子能力以 PRD 冻结为准）。
      在限定 ODD 内持续提示驾驶员监控交通并随时准备接管；在失效、ODD 越界或驾驶员未响应时，按策略降级、提示或退出至安全可控状态。
    non_safety_objectives:
      - 路线跟随平顺性与纵向舒适性
      - 减少非必要告警与突兀横向/纵向动作
      - 在合规与安全前提下提升通行效率
  driving_automation:
    level: "2（组合驾驶辅助）"
    standard: GB/T 40429-2021
    role_phases:
      - phase: 激活前
        user_role: 驾驶员确认交通环境、系统能力与责任边界，按需设置导航与功能开关
        system_role: 自检 ODD、关键传感器/执行链路状态，不满足则禁止激活或限制能力
      - phase: 运行中
        user_role: 持续监控道路与系统状态，按提示执行接管；执行动态驾驶任务中的目标和策略监控（L2 定义要求）
        system_role: 在 ODD 内执行横向与纵向运动控制子任务，输出状态与告警，请求接管或执行降级
      - phase: 退出后
        user_role: 完全承担动态驾驶任务
        system_role: 进入非激活状态，保留必要提示与诊断信息
  odd:
    reference: ODD-NOA-001（见输入文档；详细道路类型/地理围栏/速度/天气/交通场景以项目 ODD 表为准）
  vehicle_safety_strategy:
    laws:
      - 运行行为应符合道路交通法规及项目目标市场强制性要求（具体条款由合规部门维护，本文档不逐条断言合规结论）。
    driving_behavior:
      - 在 ODD 内避免无故扰乱交通流；对交通控制设施与周边参与者状态作出合理响应（策略细节见功能规范）。
      - 保持与其他交通参与者合理的安全间距；探测与响应能力应与 ODD 及感知性能声明一致。
    misuse_hmi:
      - 设计应覆盖合理可预见误用（如过度依赖系统）；向驾驶员提供清晰、可区分的系统状态与接管请求。
      - 首次进入运行状态前提示驾驶员在使用期间须持续履行动态驾驶任务相关职责（与适用标准要求对齐，以项目裁剪为准）。
    fault_handling:
      - 检测并响应影响安全运行的失效；在无法维持安全辅助时以安全方式终止或降级 NOA。
      - 具备与风险相称的降级/最小风险策略（RMF/MRM 等命名以项目为准），并结合交通环境与系统能力选择策略。
    sotif_residual: >-
      整车层面残余风险接受准则与验证策略见项目 SOTIF 计划；与本相关项相关的性能局限场景须在 SOTIF 记录中可追溯至 NOA ODD 与测试证据。
    alerts: 具体提示与报警清单见项目「系统提示/HMI」规范或专用表（如系统提示.xlsx）；声学/光学/触觉形式按 HMI 设计统一描述。
    degradation_rationale: >-
      《NOA简介》中「降级思路」条目下正文待项目补全；工程上降级状态与跳转以项目状态机为准：典型触发包括 ODD 边界、关键传感器/定位失效、
      执行器拒绝、驾驶员未响应接管请求等；对应 NOA_Limited / NOA_Exit 等与 HMI 联动。
  alerts_degradation:
    rm_states:
      - state: NOA_Full
        description: ODD 内全功能可用（以项目定义为准）
        note: 示例命名，项目可重命名
      - state: NOA_Limited
        description: 能力受限（如禁止变道、降低目标车速）
        note: 待项目细化
      - state: NOA_Exit
        description: 退出 NOA，驾驶员承担全部动态驾驶任务
        note: 与 HMI 提示联动
    triggers:
      - trigger: ODD 边界探测触发
        description: 道路类型/天气/车速等超出 ODD
        note: 对应传感器与地图策略见 ODD-NOA-001
      - trigger: 关键失效或置信度不足
        description: 感知/定位/执行反馈异常
        note: 与 DTC 及降级表映射
      - trigger: 驾驶员接管或抑制条件满足
        description: 方向盘/制动/拨杆等有效干预
        note: 以驾驶员在环策略为准
  use_cases:
    - id: UC-NOA-INTRO-001
      name: 高速 I 型道路导航巡航（车道内 ACC + 车道保持）
      primary_actors: 驾驶员、NOA
      secondary_actors: 导航、感知、执行、HMI
      preconditions: NOA 可用，ODD 为高速/封闭道路，导航路线有效
      main_success: 车道内跟车与横向保持符合预期
      extensions: 慢车、切入、车道减少
    - id: UC-NOA-INTRO-002
      name: 自动上下匝道
      primary_actors: 驾驶员、NOA
      secondary_actors: 地图、感知、HMI
      preconditions: 匝道拓扑与定位匹配满足门限
      main_success: 按策略完成减速/分合流或提示接管
      extensions: 地图与实际不一致
    - id: UC-NOA-INTRO-003
      name: 驾驶员触发换道 / 确认换道 / 自动换道
      primary_actors: 驾驶员、NOA
      secondary_actors: 侧向感知、HMI
      preconditions: 邻车道安全间隙与法规允许；确认类需驾驶员确认（若配置）
      main_success: 换道完成或安全中止
      extensions: 邻车加速、盲区目标、取消
  function_partition:
    - subfunction: 车道内自适应巡航
      description: 在车道内基于导航与前方交通目标执行纵向自适应巡航（含跟车、调速等；《NOA简介》功能划分）
      note: 与 ACC 能力边界、NOA 模式切换以项目为准
    - subfunction: 驾驶员触发换道
      description: 由驾驶员操作（如拨杆）显式触发换道意图，系统执行换道辅助路径与执行请求（《NOA简介》功能划分）
      note: 人机职责与取消策略见 HMI 规范
    - subfunction: 驾驶员确认换道
      description: 系统提出换道建议或请求，需驾驶员确认后执行换道（《NOA简介》功能划分；若项目配置）
      note: 与自动换道的策略差异须书面化
    - subfunction: 自动换道
      description: 在满足安全、法规与 ODD 策略下自动发起并完成换道（《NOA简介》功能划分；若项目配置）
      note: 邻车道风险评估与禁止条件见设计
    - subfunction: 导航与路线约束 / 感知融合与 ODD / 状态机与执行-HMI 输出
      description: 支撑上述产品功能的共通技术块：路线与匝道拓扑、环境融合、NOA 状态机与降级、对执行层与 HMI 的输出（与《NOA简介》「功能架构」章节对应，细化见 SYS-ARCH-001）
      note: 非《NOA简介》顶层四条目，但为实现所必需
  boundary_interfaces:
    in_scope:
      - 导航路线、地图/定位与 ODD 相关输入的融合与约束
      - 车道线、目标、限速、道路结构等感知要素在规划中的使用
      - L2 NOA 状态机、激活/退出/降级逻辑及提示报警策略
      - 向执行层或域控输出横向/纵向控制请求、轨迹或目标状态及有效位
    out_of_scope:
      - 转向/制动/驱动执行器底层控制律（若由其他相关项实现）
      - 遥控泊车、L3+ 有条件自动驾驶责任转移
      - 纯娱乐导航与驾驶员监控（DMS）本体算法（若 DMS 为独立 Item）
    interfaces:
      - id: IF-NOA-MAP-001
        object: 导航 / HD Map / 定位
        direction: 输入
        signal: 路线、车道拓扑、定位姿态与匹配质量、地理围栏事件
        normal_range: 匹配质量与数据新鲜度满足 NOA 激活阈值
        abnormal_handling: 降精度或禁止激活/触发降级
      - id: IF-NOA-PER-001
        object: 环境感知（摄像头 / 毫米波雷达 / 激光雷达等，按架构）
        direction: 输入
        signal: 车道/边界、目标列表、速度/距离、交通标志与置信度
        normal_range: 输出频率与延迟满足规划周期
        abnormal_handling: 低置信度区域限制车速或禁止变道等
      - id: IF-NOA-VEH-001
        object: 车辆运动与底盘状态（总线）
        direction: 输入
        signal: 车速、横摆、转向角、制动/驱动执行状态、转向灯等
        normal_range: 信号有效且同步
        abnormal_handling: 关键信号丢失触发安全退出
      - id: IF-NOA-EXE-001
        object: 执行 / 域控制器
        direction: 输出
        signal: 横向/纵向请求或轨迹、功能状态、有效位、拒绝原因
        normal_range: 下游在时限内确认执行
        abnormal_handling: 超时/拒绝则降级并提示接管
      - id: IF-NOA-HMI-001
        object: HMI / 仪表 / 声学告警
        direction: 输出
        signal: 功能状态、接管请求、降级原因码、文本与图标
        normal_range: 告警优先级符合人机工程策略
        abnormal_handling: HMI 故障时禁止激活或强制退出（项目策略）
  operating_scenarios:
    - id: SCN-NOA-L2-000
      description: 高速与封闭道路（I 型道路）导航辅助运行
      conditions: 与《NOA简介》一致的道路类型；车速、天气、交通复杂度在 ODD 内
      driver_state: 监控路况，手眼在环（以 DMS/方向盘策略为准）
      note: 与功能简介对齐的顶层场景
    - id: SCN-NOA-L2-001
      description: 高速公路主路车道保持与跟车巡航
      conditions: 结构化道路，车道线清晰，设计速度区间内，天气在 ODD 内
      driver_state: 监控路况，手眼在环（以 DMS/方向盘策略为准）
      note: 基线运行场景
    - id: SCN-NOA-L2-002
      description: 匝道驶入/驶出与分流鼻端区域
      conditions: 曲率增大、车流交织、道路拓扑变化
      driver_state: 注意力需求升高，易触发接管提示
      note: 关键安全场景
    - id: SCN-NOA-L2-003
      description: 施工区 / 临时标线 / 车道封闭
      conditions: 锥桶、水马、临时车道线，感知不确定性高
      driver_state: 需及时接管
      note: ODD 与降级策略重点
    - id: SCN-NOA-L2-004
      description: 雨雾夜间等低能见度
      conditions: 传感器性能下降，定位/视觉受限
      driver_state: 接管响应时间要求更高
      note: SOTIF 与 ODD 交界
    - id: SCN-NOA-L2-005
      description: 变道辅助（若配置：自动/确认变道）
      conditions: 邻车道空间、相对速度、法规允许车道
      driver_state: 监控侧向风险，可随时取消
      note: 功能若未配置可标注 N/A
    - id: SCN-NOA-L2-006
      description: 交通拥堵走走停停（若 ODD 包含）
      conditions: 低速跟车，加塞频繁
      driver_state: 注意力易分散
      note: 与跟车舒适性及碰撞风险相关
  functional_runtime_state: >-
    纵向控制、横向控制、变道相关子状态机及相互抑制关系以项目状态机图与接口规范为准；须与降级表、ODD 事件及驾驶员接管检测一致。
  foreseeable_misuse:
    - 双手长时间脱离方向盘（若未配备合规 DMS 抑制策略）
    - 视线长时间偏离路面（分心、使用手机）
    - 在 ODD 外强行保持激活或忽视接管请求
    - 过度信任系统导致接管延迟
  non_functional:
    quality: 软件过程与发布准则遵循项目质量体系（如 ASPICE 与功能安全流程接口，待项目声明）
    performance: 规划与控制时延、最大横向/纵向加速度/加加速度限值以 SSTS 与标定为准（待填入具体指标表）
  dependency_other_to_this:
    - 高精地图/众包更新服务可用性与版本管理（若架构依赖）
    - 云平台路线服务（若适用）的可用性与安全通信
  dependency_this_to_other:
    - 车辆须具备符合项目定义的自动紧急制动（AEB）能力；NOA 不应抑制正在执行的紧急制动请求（与适用标准及架构仲裁一致）
    - 与 LKA、ELK、ACC 等相关功能的仲裁矩阵须书面化，避免控制目标冲突
  dependency_environment:
    - 道路几何、标志标线、照明与天气须在 ODD 声明范围内；超出则须退出或降级
  dependencies_constraints:
    - id: DEP-NOA-L2-001
      dependency: ODD 监控与地图/定位质量
      constraint: 激活与能力释放门限可配置且可验证
      impact_if_failed: 超 ODD 运行
    - id: DEP-NOA-L2-002
      dependency: 驾驶员监控与接管检测（方向盘扭矩、DMS 等）
      constraint: 满足项目 L2 运行法规与内部准则
      impact_if_failed: 脱手/分心未被有效约束
    - id: DEP-NOA-L2-003
      dependency: 感知与融合性能
      constraint: 漏检率、误检率、时延满足 SSTS
      impact_if_failed: 错误轨迹与碰撞风险
    - id: DEP-NOA-L2-004
      dependency: 执行器与通信链路
      constraint: 超时、拒绝与回滚策略明确
      impact_if_failed: 控制失步或无法安全退出
    - id: DEP-NOA-L2-005
      dependency: 电源与网络安全（如适用）
      constraint: 异常工况下进入已知安全状态
      impact_if_failed: 非预期激活或失效
  known_failure_modes:
    - 规划模块输出错误曲率或目标车速导致偏离车道或追尾风险（需在系统阶段细化失效模式）
    - 感知/定位融合错误导致「虚假可行驶区域」
  known_trigger_conditions:
    - 以项目采纳的组合驾驶辅助标准中已知触发条件表为输入（如强标征求意见稿附录，以正式版本为准）；NOA 子功能逐项映射待完成
  known_failures_initial_concerns:
    - id: CON-NOA-L2-001
      concern: 弯道/匝道速度规划不当导致冲出车道或侧向碰撞
      source: 场景仿真与评审
      severity_preliminary: 待定
      downstream: HARA 危害事件
    - id: CON-NOA-L2-002
      concern: 变道决策错误（邻车加速/盲区目标）导致侧向碰撞
      source: 评审
      severity_preliminary: 待定
      downstream: HARA / SOTIF
    - id: CON-NOA-L2-003
      concern: 应退出未退出或提示不足，驾驶员未及时接管
      source: 可控性假设评审
      severity_preliminary: 待定
      downstream: HARA（E/C）
    - id: CON-NOA-L2-004
      concern: 错误抑制 AEB 或与横向控制冲突导致紧急避险能力下降
      source: 接口 FMEA
      severity_preliminary: 待定
      downstream: FSC 相关项协同
    - id: CON-NOA-L2-005
      concern: 地图/定位跳变导致轨迹突变
      source: 数据记录分析
      severity_preliminary: 待定
      downstream: HARA / SOTIF
  operational_safety_assurance:
    operational_design: 运行阶段数据记录、事件触发上传、OTA 与配置变更的安全影响分析（如适用）按项目运维安全计划执行；本文档仅标识需求入口
  implementation:
    architecture: >-
      《NOA简介》中「功能架构」条目下正文待项目补全；逻辑/物理架构与数据流以 SYS-ARCH-001 及接口规范为准。
      NOA 软件部署于项目指定智驾域控（待填具体 ECU）。
    nf_quality: 与智驾软件发布门禁一致（静态分析、需求追溯、变更评审）
    nf_performance: 规划环路与控制周期、端到端时延预算见软件架构说明（待填）
    element_failure_modes: 要素级失效模式在系统/软件 FMEA 中展开；本文档不替代 FMEA
    element_trigger_conditions: 传感器单点性能边界在 SOTIF 与传感器安全概念中维护
