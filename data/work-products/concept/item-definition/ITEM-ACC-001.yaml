content:
  item_overview:
    item_name: ACC（Adaptive Cruise Control，自适应巡航控制）
    functional_objective: 在限定工况下自动维持设定车速，并基于前向目标信息调节纵向加减速以保持设定车距；当系统能力不足或驾驶员操作时，退出 ACC 并提示驾驶员接管。
    non_safety_objectives:
      - 提升跟驰舒适性（平顺加减速）
      - 减少误触发告警与不必要退出
      - 适应常见交通流变化（插队/加塞）
  boundary_interfaces:
    in_scope:
      - ACC 激活/保持/退出与恢复逻辑
      - 目标检测结果使用（目标距离/相对速度/置信度）与目标选择策略
      - 纵向控制请求输出（加速度/减速度目标、车距设定等，按架构）
      - 降级与告警策略（传感器不可用、执行限制等）
    out_of_scope:
      - 底盘执行闭环控制算法细节（由底盘/动力域实现）
      - 横向控制（车道保持、转向控制等）
      - 交通标志识别的法规策略（若涉及限速控制，需单独界定）
    interfaces:
      - id: IF-ACC-001
        object: 感知系统（雷达/摄像头/融合，按项目）
        direction: 输入
        signal: 前向目标列表（距离/相对速度/置信度/ID）、目标有效位
        normal_range: 周期与时延满足 ACC 控制周期，置信度满足最小要求
        abnormal_handling: 置信度不足或目标丢失时进入保守跟驰/退出并告警
      - id: IF-ACC-002
        object: 车辆状态总线（CAN/Ethernet）
        direction: 输入
        signal: 车速、纵向加速度、档位、制动状态、踏板/按键输入、ESC/ABS 状态
        normal_range: 信号有效且周期满足控制需求
        abnormal_handling: 关键状态失效触发退出 ACC 并上报故障
      - id: IF-ACC-003
        object: 底盘/动力/制动控制器或域控
        direction: 输出
        signal: 纵向加减速请求/目标、功能状态与有效位、限制请求
        normal_range: 下游确认接收并反馈执行状态/限制原因
        abnormal_handling: 通信超时/拒绝执行时退出 ACC 并告警
      - id: IF-ACC-004
        object: HMI
        direction: 输出
        signal: ACC 可用/激活/退出、接管告警、原因码、车距设定显示
        normal_range: 告警通路可用且优先级正确
        abnormal_handling: HMI 不可用时禁止激活或强制退出
  operating_scenarios:
    - id: SCN-ACC-001
      description: 高速跟驰巡航（前车稳定）
      conditions: 高速道路，良好天气，车速 60-120 km/h（以项目为准）
      driver_state: 正常驾驶，手握方向盘监督
      note: 基线场景
    - id: SCN-ACC-002
      description: 城市快速路车流变化（插队/切入）
      conditions: 30-90 km/h，车流密集，前车频繁变道
      driver_state: 注意力需要保持，可能频繁介入
      note: 目标切换关键场景
    - id: SCN-ACC-003
      description: 下坡/弯道导致制动能力受限或目标误差增大
      conditions: 坡道/弯道，路面附着变化
      driver_state: 需要随时介入
      note: 执行限制与退出策略场景
    - id: SCN-ACC-004
      description: 恶劣天气/传感器遮挡导致目标置信度下降
      conditions: 大雨/雾/强反光，传感器脏污/遮挡
      driver_state: 需要及时接管
      note: 降级/告警场景
  dependencies_constraints:
    - id: DEP-ACC-001
      dependency: 前向目标检测与置信度输出
      constraint: 关键目标在最小距离范围内可检测，输出时延受控
      impact_if_failed: 漏检/误检导致跟驰距离控制失效
    - id: DEP-ACC-002
      dependency: 底盘/动力执行能力
      constraint: 在典型工况下可提供足够减速度与响应
      impact_if_failed: 跟驰减速不足导致追尾风险上升
    - id: DEP-ACC-003
      dependency: 驾驶员告警与接管机制
      constraint: 告警可达、可理解，接管输入可被系统可靠识别
      impact_if_failed: 可控性下降，退出后驾驶员无法及时接管
  known_failures_initial_concerns:
    - id: CON-ACC-001
      concern: 漏检前车或目标切换错误导致未及时减速，车距不足
      source: 经验/评审
      severity_preliminary: 待定
      downstream: 输入 HARA 危害事件
    - id: CON-ACC-002
      concern: 错误加速/减速请求导致突兀纵向控制，引发追尾或被追尾风险
      source: 评审
      severity_preliminary: 待定
      downstream: 输入 HARA 危害事件
    - id: CON-ACC-003
      concern: 能力不足场景未及时退出或告警不明确，驾驶员未及时接管
      source: 人机评审
      severity_preliminary: 待定
      downstream: 输入 HARA（可控性假设）
