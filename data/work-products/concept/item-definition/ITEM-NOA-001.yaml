      evidence_ref: SOTIF-WP-NOA-001（计划）
  project_assumptions:
    - id: ASM-NOA-L2-001
      assumption: ODD 由项目明确定义，且系统能在运行时识别关键边界并触发抑制、降级或退出
      impact: 场景与暴露度（E）评估、降级策略完整性
      risk_if_invalid: 超 ODD 运行导致风险不可接受
      verification: ODD 文档评审 + 实车/仿真 ODD 探针测试
    - id: ASM-NOA-L2-002
      assumption: 驾驶员具备有效接管能力；HMI 能清晰提示系统状态、接管请求与降级原因
      impact: 可控性（C）与告警链路
      risk_if_invalid: 接管延迟或误解导致事故风险上升
      verification: HMI 评审 + 用户试验 / 驾驶模拟器
    - id: ASM-NOA-L2-003
      assumption: 感知、定位与地图匹配在 ODD 内满足项目定义的最小性能与置信度策略
      impact: 轨迹规划与碰撞避免相关假设
      risk_if_invalid: 漏检/误检导致错误轨迹
      verification: 场景库测试 + KPI 报告
    - id: ASM-NOA-L2-004
      assumption: 车辆搭载 AEB 等紧急避险能力，且 NOA 不因组合辅助而非法抑制紧急制动（以适用法规与架构为准）
      impact: 相关项间安全依赖
      risk_if_invalid: 紧急制动被抑制
      verification: 接口规范与故障注入测试
