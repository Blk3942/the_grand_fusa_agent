content:
  item_overview:
    item_name: AEB（Automatic Emergency Braking，自动紧急制动）
    functional_objective: 在限定工况下评估前向碰撞风险，并在满足触发条件时自动请求制动以避免或减轻与前方目标的碰撞；在系统能力不足或驾驶员介入时执行抑制/退出并提示驾驶员。
    non_safety_objectives:
      - 降低误触发率并提高驾驶员接受度
      - 在保证安全的前提下减少不必要的强制制动
      - 提升复杂场景（弯道、坡道、低附着）下的稳定性
  boundary_interfaces:
    in_scope:
      - AEB 激活/可用/退出状态机与触发条件判定
      - 前向目标与碰撞风险评估（TTC 等指标使用，具体算法按项目）
      - 制动请求输出（减速度目标/制动压力请求/制动等级等，按架构）
      - 误触发抑制与驾驶员介入检测（踏板、方向盘等）
      - 与 FCW（Forward Collision Warning，前向碰撞预警）协同（若属于同一功能簇）
    out_of_scope:
      - 制动执行闭环控制算法细节（由制动/底盘控制器实现）
      - 横向避让策略（如自动转向避障，若有则另行界定）
    interfaces:
      - id: IF-AEB-001
        object: 感知系统（雷达/摄像头/融合，按项目）
        direction: 输入
        signal: 前向目标列表（距离/相对速度/类别/置信度/ID）、目标有效位
        normal_range: 周期与时延满足触发判定需求，置信度满足最小要求
        abnormal_handling: 置信度不足时抑制触发并提示功能不可用/降级
      - id: IF-AEB-002
        object: 车辆状态总线（CAN/Ethernet）
        direction: 输入
        signal: 车速、纵向加速度、制动踏板/油门踏板、方向盘角度/扭矩、ESC/ABS 状态
        normal_range: 信号有效且周期满足触发判定与抑制逻辑
        abnormal_handling: 关键状态失效触发退出/禁止触发并上报故障
      - id: IF-AEB-003
        object: 制动/底盘控制器或域控
        direction: 输出
        signal: AEB 制动请求（等级/减速度目标/有效位）、释放/退出请求（如适用）、执行状态反馈
        normal_range: 下游确认接收并在规定时间内建立制动，反馈可用性与限制原因
        abnormal_handling: 通信超时/拒绝执行时触发故障上报并提示驾驶员（碰撞缓解能力下降）
      - id: IF-AEB-004
        object: HMI
        direction: 输出
        signal: 功能可用/激活/触发提示、告警等级、原因码
        normal_range: 告警通路可用且优先级正确
        abnormal_handling: HMI 不可用时限制功能或提升保守策略（按项目）
  operating_scenarios:
    - id: SCN-AEB-001
      description: 城市道路前车急刹导致碰撞风险上升
      conditions: 10-60 km/h，城市道路，交通流变化
      driver_state: 正常驾驶，可能反应延迟
      note: 基线场景
    - id: SCN-AEB-002
      description: 高速跟车遇前车骤停/切入
      conditions: 60-120 km/h，高速道路，切入车辆
      driver_state: 需要及时介入，反应时间关键
      note: 高严重度场景
    - id: SCN-AEB-003
      description: 行人横穿/自行车切入（若支持 VRU）
      conditions: 城市道路，夜间/逆光等复杂光照
      driver_state: 可能未及时注意到目标
      note: 目标类型覆盖需项目确认
    - id: SCN-AEB-004
      description: 弯道/坡道/低附着导致目标识别与制动能力边界变化
      conditions: 弯道/坡道，雨雪冰等低附着
      driver_state: 需要及时接管或调整车速
      note: 误触发抑制与减速度策略关键场景
  dependencies_constraints:
    - id: DEP-AEB-001
      dependency: 前向目标检测与分类
      constraint: 在最小距离范围内可检测关键目标并提供置信度
      impact_if_failed: 漏检导致未触发；误检导致误触发
    - id: DEP-AEB-002
      dependency: 制动系统可用性与性能
      constraint: 制动建立时间与最大减速度满足最小碰撞缓解需求
      impact_if_failed: 碰撞不可避免或减轻不足
    - id: DEP-AEB-003
      dependency: 驾驶员介入检测与退出策略
      constraint: 能可靠检测踏板/转向介入并按策略抑制/退出
      impact_if_failed: 误触发无法抑制或退出不及时
  known_failures_initial_concerns:
    - id: CON-AEB-001
      concern: 碰撞风险被低估导致未触发或触发过晚，无法避免/减轻碰撞
      source: 经验/评审
      severity_preliminary: 待定
      downstream: 输入 HARA 危害事件
    - id: CON-AEB-002
      concern: 误触发强制制动导致被追尾或驾驶员失控风险
      source: 评审
      severity_preliminary: 待定
      downstream: 输入 HARA 危害事件与可控性分析
    - id: CON-AEB-003
      concern: 触发后制动请求未被执行或执行不足（接口/故障/限制）
      source: 接口评审
      severity_preliminary: 待定
      downstream: 输入 HARA（安全目标与诊断机制）
