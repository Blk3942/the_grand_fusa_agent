base:
  purpose: 定义驾驶员监控系统（DMS）在项目中的功能边界、外部接口、运行场景与约束，作为后续 HARA 与 FSC 的上游输入。
  scope_boundary:
    system_function_boundary:
      - 驾驶员状态监测与告警输出（舱内感知、状态机、接口输出）
      - 不包含自动驾驶策略决策与执行机构控制
    v_model_stage:
      - 概念
  inputs_references:
    - id: PRD-DMS-001
      name: 驾驶员状态监测需求
      version: v0.3
      source: 产品需求文档
      note: 草案
    - id: IF-SPEC-DMS-001
      name: DMS 对外接口说明
      version: v0.2
      source: 系统接口规范
      note: 草案
    - id: SYS-ARCH-001
      name: 系统架构说明
      version: v0.4
      source: 系统架构文档
      note: 草案
  standard_requirements:
    - standard: ISO 26262
      part_clause: Part 3（Concept Phase）
      applicability: Item Definition 需作为 HARA 输入
      evidence_ref: SYS-REV-DMS-ITEM-001（计划）
  project_assumptions:
    - id: ASM-DMS-ITEM-001
      assumption: 车辆具备可用的驾驶员面部采集硬件与稳定安装位置
      impact: 感知输入链路
      risk_if_invalid: 误检/漏检增加
      verification: 在样车阶段执行安装一致性检查与标定验证
    - id: ASM-DMS-ITEM-002
      assumption: HMI 可支持分级告警呈现且优先级策略可配置
      impact: 告警呈现链路
      risk_if_invalid: 驾驶员未接收关键告警
      verification: 进行 HMI 接口联调与人机评审
    - id: ASM-DMS-ITEM-003
      assumption: 下游 ADAS 功能对 DMS 状态有效位有明确处理策略
      impact: 下游功能联动
      risk_if_invalid: 下游误用无效状态
      verification: 在系统接口规范中固化并通过集成测试验证
  traceability:
    - item_id: ITM-DMS-001
      upstream: PRD-DMS-001
      downstream: HARA-DMS-001（待建）/FSC-DMS-001（待建）
      verification_method: 评审
      evidence_id: SYS-REV-DMS-ITEM-001
  open_verification_items:
    - id: OVI-DMS-ITEM-001
      item: 极端光照、遮挡、佩戴口罩/墨镜等条件下检测性能边界
      owner: 待定
      due: 待定
      status: Open
    - id: OVI-DMS-ITEM-002
      item: 告警阈值策略对误报/漏报平衡的影响
      owner: 待定
      due: 待定
      status: Open
    - id: OVI-DMS-ITEM-003
      item: 通信中断时的降级行为是否满足安全目标分解需求
      owner: 待定
      due: 待定
      status: Open
  review_approval:
    - role: 作者
      name: 系统安全工程师（待定）
      conclusion: N/A
      date: 2026-03-27
    - role: 评审者
      name: 系统工程负责人（待定）
      conclusion: 待填写
      date: 待填写
    - role: 批准者
      name: 功能安全经理（待定）
      conclusion: 待填写
      date: 待填写
  change_history:
    - version: v0.1
      date: 2026-03-27
      summary: 创建 DMS Item Definition 草案
      reason: 概念阶段初始化
      author: AI Assistant
  notes_boundary:
    - 本文档为 Item Definition 草案，不构成 ASIL 等级最终结论。
    - ASIL（Automotive Safety Integrity Level，汽车安全完整性等级）需在 HARA 完成后按场景进行判定。
    - 若项目涉及“无故障但性能不足”导致风险的场景，应在后续补充 ISO 21448（SOTIF）分析并与 ISO 26262 结论分开记录。

content:
  item_overview:
    item_name: 驾驶员监控系统（Driver Monitoring System, DMS）
    functional_objective: 在车辆运行过程中监测驾驶员注意力与状态（分心、疲劳、闭眼、视线偏离等），并在满足触发条件时向驾驶员和上层功能提供告警/状态输出。
    non_safety_objectives:
      - 降低误报率
      - 提升告警可接受性
      - 优化夜间与逆光场景可用性
  driving_automation:
    level: 非驾驶自动化横向/纵向控制（舱内监测与告警类功能）
    standard: GB/T 40429-2021（参考驾驶员角色与监控义务；不声明 L2 行车自动化）
    role_phases: []
  odd:
    reference: N/A（DMS 的 ODD 与整车 NOA/行车功能解耦；摄像头安装与光照条件见依赖与场景约束）
  vehicle_safety_strategy:
    laws: 待填写（引用项目适用的智能网联/舱内监控相关法规与型式要求）
    driving_behavior: 待填写（对驾驶员注意力、接管义务与告警响应的期望行为）
    sotif_residual: 待填写（整车层残余风险接受准则及与 ISO 21448 活动对应关系；勿与 ISO 26262 危害混写）
  alerts_degradation:
    alerts:
      - 分级视觉/声学告警文案与图标（与 HMI 规范一致）
      - 状态栏/指示灯请求（与域控协议一致）
    rationale: 图像丢失或置信度不足时进入降级监测；通信超时上报故障态。
    rm_states:
      - state: 全功能监测
        description: 图像与算法置信度正常
        note: ""
      - state: 降级监测
        description: 单路图像失效或低置信度
        note: 收窄告警策略
      - state: 故障/不可用
        description: 关键输入长时间无效
        note: 输出无效态与故障码
    triggers:
      - trigger: 图像帧丢失超过 T1
        description: 进入降级监测
        note: 待定 ms
      - trigger: 与 HMI/域控通信超时 T2
        description: 输出故障态
        note: 待定 ms
  boundary_interfaces:
    in_scope:
      - 驾驶员舱内图像采集（红外/可见光摄像头，具体型号待定）
      - 驾驶员状态估计与分类算法
      - DMS 状态机与告警触发逻辑
      - 向 HMI 与车辆域控制器输出状态信号
    out_of_scope:
      - 自动驾驶策略决策本体
      - 制动/转向执行机构控制
      - 驾驶员身份识别与娱乐功能
    interfaces:
      - id: IF-DMS-001
        object: 驾驶员舱摄像头
        direction: 输入
        signal: 图像帧、时间戳、曝光状态
        normal_range: 帧率与时延满足系统设计值
        abnormal_handling: 图像丢失时上报降级状态
      - id: IF-DMS-002
        object: 车辆状态总线（CAN/Ethernet）
        direction: 输入
        signal: 车速、档位、横纵向控制状态
        normal_range: 信号周期与质量位有效
        abnormal_handling: 信号失效时进入保守策略
      - id: IF-DMS-003
        object: HMI
        direction: 输出
        signal: 分级告警请求、文本/图标编码
        normal_range: 与 HMI 接口协议一致
        abnormal_handling: HMI 不可用时输出故障状态
      - id: IF-DMS-004
        object: ADAS/域控
        direction: 输出
        signal: 驾驶员可用性状态、风险等级
        normal_range: 周期输出且带有效位
        abnormal_handling: 通信超时时触发故障上报
  operating_scenarios:
    - id: SCN-DMS-001
      description: 城市跟车场景下注意力监控
      conditions: 0-80 km/h，白天/夜晚，城市道路
      driver_state: 正常驾驶
      note: 基线场景
    - id: SCN-DMS-002
      description: 高速巡航场景下疲劳监控
      conditions: 60-120 km/h，高速道路
      driver_state: 疲劳累积、眨眼频繁
      note: 重点安全场景
    - id: SCN-DMS-003
      description: 夜间逆光/遮挡场景
      conditions: 夜间、隧道出入口、镜片反光
      driver_state: 头部偏转或部分遮挡
      note: 感知鲁棒性边界场景
    - id: SCN-DMS-004
      description: 低速拥堵与短时视线转移
      conditions: 0-30 km/h，拥堵路况
      driver_state: 临时视线偏离
      note: 需区分正常行为与风险行为
  function_partition:
    - subfunction: 图像采集与预处理
      description: 舱内相机输入、曝光与丢帧处理
      note: 硬件相关
    - subfunction: 状态估计与告警策略
      description: 分心/疲劳等分类与阈值
      note: 算法相关
    - subfunction: 对外输出与状态机
      description: HMI/域控接口与有效位
      note: 集成相关
  use_cases:
    - id: UC-DMS-001
      name: 城市路况注意力监控
      primary_actors: 驾驶员、DMS
      secondary_actors: HMI、域控（消费状态）
      preconditions: 车辆上电，DMS 可用，车速在监测范围内
      main_success: 检测到分心趋势时分级提示，状态有效位正确
      extensions: 光照差导致置信度低时降级提示策略
    - id: UC-DMS-002
      name: 高速疲劳趋势告警
      primary_actors: 驾驶员、DMS
      secondary_actors: HMI
      preconditions: 高速场景，算法运行周期满足
      main_success: 疲劳指标超阈时触发告警且不频繁误报
      extensions: 驾驶员关闭某类提示时的行为（若项目允许）
  functional_runtime_state:
    states:
      - state: "Off"
        description: 相关项未运行或未就绪
        note: ""
      - state: Standby
        description: 就绪、等待有效输入
        note: ""
      - state: Active
        description: 正常监测与输出
        note: ""
      - state: Degraded
        description: 输入质量不足，输出降级状态
        note: ""
    transitions:
      - trigger: 上电完成且自检通过
        description: Off → Standby
        note: ""
      - trigger: 收到有效车辆状态且相机 OK
        description: Standby → Active
        note: ""
      - trigger: 图像长时间无效
        description: Active → Degraded
        note: ""
    notes: 详细状态机以项目 UML 为准；本节供安全分析与接口对齐。
  foreseeable_misuse:
    - id: 1
      description: 故意遮挡摄像头以规避监测
      note: 与误用场景、可控性分析输入 HARA/SOTIF
    - id: 2
      description: 过度依赖告警忽视路况
      note: HMI 设计约束
  non_functional:
    quality: 软件需满足项目编码规范与静态分析门禁（待定义）
    performance: 端到端时延、CPU 负载、帧率目标见 SSTS（待填写具体数值）
  dependency_other_to_this: 待填写（如整车电源、摄像头供应商安装规范）
  dependency_this_to_other: 待填写（如 HMI 对告警呈现能力、域控对状态消费策略）
  dependency_environment: 待填写（温度、振动、电磁环境）
  dependencies_constraints:
    - id: DEP-DMS-001
      dependency: 摄像头硬件与安装位
      constraint: 视场角、遮挡率、标定偏差满足规格
      impact_if_failed: 误检/漏检增加
    - id: DEP-DMS-002
      dependency: 计算平台（SoC/MCU）
      constraint: 算法周期预算满足实时性目标
      impact_if_failed: 输出滞后导致告警延迟
    - id: DEP-DMS-003
      dependency: 车辆网络通信
      constraint: 总线时延与丢包率在设计范围
      impact_if_failed: 状态输出中断或陈旧
    - id: DEP-DMS-004
      dependency: 电源与唤醒管理
      constraint: 电压范围、上电时序满足要求
      impact_if_failed: 模块重启或不可用
    - id: DEP-DMS-005
      dependency: HMI 承载能力
      constraint: 告警呈现策略与优先级一致
      impact_if_failed: 告警未显示或误导驾驶员
  known_failures_initial_concerns:
    - id: CON-DMS-001
      concern: 驾驶员高风险分心未被检测（漏检）
      source: 历史项目经验
      severity_preliminary: 待定
      downstream: 输入 HARA 危害事件
    - id: CON-DMS-002
      concern: 误报频繁导致驾驶员忽视真实告警
      source: 行为研究与评审
      severity_preliminary: 待定
      downstream: 输入 HARA 与可控性分析
    - id: CON-DMS-003
      concern: 图像遮挡/光照极端导致状态不可信
      source: 技术评审
      severity_preliminary: 待定
      downstream: 输入 HARA 场景细化
    - id: CON-DMS-004
      concern: 通信异常导致下游使用过期状态
      source: 接口评审
      severity_preliminary: 待定
      downstream: 输入 FSC 接口安全机制
  known_failure_modes: 摄像头失效、算法输出卡死、总线断连导致状态不更新（细化见 FMEA）
  known_trigger_conditions: 持续丢帧、CPU 过载、标定偏差超阈
  operational_safety_assurance:
    operational_design: 待填写（运行阶段数据采集、OTA 回滚策略、现场诊断与告警闭环，若项目适用）
  implementation:
    architecture: 逻辑上分为感知输入、算法与状态机、对外输出；详细框图见架构示意图与 UML。
    architecture_elements:
      - element: 舱内相机与 ISP
        description: 提供图像与时间戳
        note: 供应商相关
      - element: DMS 应用与状态机
        description: 状态估计、告警与降级
        note: 软件单元划分以架构为准
      - element: 通信栈
        description: 与 HMI/域控消息
        note: CAN/SOMEIP 等以接口规范为准
    interfaces_brief:
      - interface: IF-DMS-001～004
        description: 见边界接口表；此处为追溯摘要
        note: 详细字段见接口规范
    nf_performance: 各要素实时性、带宽与容错指标从概念阶段非功能要求拆解（待填具体值）
    element_failure_modes: 相机无图像、算法无输出、通信间歇失败
    element_trigger_conditions: 与功能层面局限一致并细化到要素级（待与 FMEA 对齐）
  diagrams:
    - id: DIAG-DMS-ARCH-001
      title: DMS 边界与数据流（示意）
      placement: item_architecture
      file_stem: dms_architecture_context
      mermaid: |
        flowchart LR
          Cam["驾驶员舱摄像头"] --> DMS["DMS 软件"]
          Bus["车辆状态总线"] --> DMS
          DMS --> Hmi["HMI"]
          DMS --> Adas["ADAS/域控"]
