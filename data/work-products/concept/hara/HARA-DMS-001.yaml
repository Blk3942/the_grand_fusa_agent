base:
  purpose: 基于 DMS Item Definition，在概念阶段识别危害事件并进行风险评估（S/E/C），提出安全目标（SG）并形成向 FSC 的追溯输入。
  scope_boundary:
    system_function_boundary:
      - 覆盖 DMS 状态估计、告警触发与对下游功能的状态输出
      - 覆盖 malfunction 引发的危害事件；对“无故障但性能不足/误用”风险在 SOTIF 中补充
    v_model_stage:
      - 概念
  inputs_references:
    - id: ITEM-DMS-001
      name: 驾驶员监控系统（DMS）Item Definition
      version: v0.1
      source: data/work-products/concept/item-definition/ITEM-DMS-001.yaml
      note: 单一真源
    - id: IF-SPEC-DMS-001
      name: DMS 对外接口说明
      version: v0.2
      source: 系统接口规范
      note: 草案
  standard_requirements:
    - standard: ISO 26262
      part_clause: Part 3（HARA）
      applicability: 危害识别、场景、危害事件、S/E/C 与安全目标
      evidence_ref: SYS-REV-DMS-HARA-001（计划）
  project_assumptions:
    - id: ASM-DMS-HARA-001
      assumption: 驾驶员在车辆运行中具备基本接管能力；在告警呈现后可在合理时间内响应（具体时间与策略待定）
      impact: 可控性 C 判定与告警策略
      risk_if_invalid: C 低估导致 ASIL 低估；告警策略不充分
      verification: 驾驶员研究/试验数据 + HMI 评审与验证
    - id: ASM-DMS-HARA-002
      assumption: 下游功能（如 L2/L2+ 辅助）对 DMS 状态有效位/失效状态有明确处理策略
      impact: 危害后果边界（下游误用影响）
      risk_if_invalid: 下游使用无效状态导致风险扩大
      verification: 系统接口规范固化 + 集成测试
  traceability:
    - item_id: HARA-DMS-001
      upstream: ITEM-DMS-001
      downstream: FSC-DMS-001（待建）
      verification_method: 评审
      evidence_id: SYS-REV-DMS-HARA-001（计划）
  open_verification_items:
    - id: OVI-DMS-HARA-001
      item: DMS 告警阈值/时序对驾驶员响应与可控性（C）的影响数据
      owner: 待定
      due: 待定
      status: Open
    - id: OVI-DMS-HARA-002
      item: DMS 误报导致驾驶员忽视真实告警的行为学影响（与 SOTIF 边界）
      owner: 待定
      due: 待定
      status: Open
    - id: OVI-DMS-HARA-003
      item: 下游 ADAS/L2 对 DMS 有效位、不可用状态、超时状态的处理一致性
      owner: 待定
      due: 待定
      status: Open
  review_approval:
