meta:
  doc_id: ITEM-ACC-001
  title: ACC（自适应巡航控制）Item Definition（相关项定义）
  work_product_type: item-definition
  iso_ref:
    - ISO 26262-3
    - GB/T 40429-2021
    - ISO 21448
  asil: 待定
  status: Draft
  owner: 系统安全团队（待定）
  reviewers: []
