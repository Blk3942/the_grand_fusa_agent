content:
  analysis_scope:
    related_item: ITEM-WIPER-001
    included_boundary:
      - 雨刮停止/速度不足等失效对驾驶视野的影响
      - 自动雨刮（若配备）异常导致的视野与驾驶员分心风险（malfunction 维度）
    excluded_boundary:
      - 机械结构可靠性详细分析（在系统/硬件阶段展开）
      - 纯性能不足/使用不当风险（SOTIF 另行分析）
  hazards_and_events:
    - he_id: HE-WIPER-001
      scenario: 高速强降雨，驾驶员依赖雨刮维持视野
      malfunction: 雨刮停止或速度不足（控制失效/堵转/供电异常），未及时检测或提示不足
      hazard_event: 驾驶员前向视野显著受限，无法及时识别前方风险
      consequence: 偏离车道/追尾/碰撞等事故风险上升
    - he_id: HE-WIPER-002
      scenario: 夜间大雨/眩光环境，视野需求更高
      malfunction: 雨刮失效导致视野受限，且告警不明确或延迟
      hazard_event: 驾驶员反应不足，发生碰撞风险上升
      consequence: 伤害风险上升
    - he_id: HE-WIPER-003
      scenario: 自动雨刮模式下，雾/毛毛雨/飞溅等边界工况
      malfunction: 自动雨刮不触发或触发不足（功能失效）
      hazard_event: 视野逐步恶化，驾驶员未及时介入
      consequence: 事故风险上升（需与 SOTIF 边界澄清）
    - he_id: HE-WIPER-004
      scenario: 自动雨刮误触发频繁（干刮/误判）
      malfunction: 自动雨刮误触发导致驾驶员分心或操作干预不当
      hazard_event: 驾驶员注意力被干扰，在复杂交通中发生风险
      consequence: 可控性下降与事故风险上升（与 SOTIF 边界相关）
  risk_assessment:
    - he_id: HE-WIPER-001
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 需结合高速暴露度与驾驶员在强降雨视野受限时的可控性数据确定
    - he_id: HE-WIPER-002
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 夜间强降雨与眩光可能提高严重度与可控性难度
    - he_id: HE-WIPER-003
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 与功能边界与驾驶员介入行为相关，需澄清 ISO 26262 / SOTIF 分工
    - he_id: HE-WIPER-004
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 误触发带来的驾驶员分心与操作后果需数据支持
  safety_goals:
    - sg_id: SG-WIPER-001
      description: 系统应在雨刮失效（停止/速度不足）时及时检测并向驾驶员提供明确提示，使驾驶员能够采取补救措施以维持安全驾驶。
      source_he_id: HE-WIPER-001
      asil: 待定
      safe_state: 提示驾驶员降低车速/靠边停车或切换手动模式（按项目定义）
    - sg_id: SG-WIPER-002
      description: 系统应避免自动雨刮失效导致视野长期恶化；在自动模式不可用或置信度不足时应提示并引导驾驶员介入。
      source_he_id: HE-WIPER-003
      asil: 待定
      safe_state: 退出自动模式并提示驾驶员手动控制（待定）
    - sg_id: SG-WIPER-003
      description: 系统应避免自动雨刮高频误触发造成驾驶员干扰；误触发检测与降级策略需可控且可解释（与 SOTIF 分工明确）。
      source_he_id: HE-WIPER-004
      asil: 待定
      safe_state: 降级自动模式/提示检查传感器并允许驾驶员手动接管（待定）
  assumptions_limits:
    - type: 假设
      id: ASM-WIPER-HARA-001
      content: 驾驶员能理解故障提示并采取减速/停车等补救
      impact: 影响可控性 C 判定
    - type: 限制
      id: LIM-WIPER-HARA-001
      content: HARA 仅覆盖 malfunction 引发的危害事件；自动雨刮性能边界与误用风险在 SOTIF 中补充
      impact: 需建立对应 SOTIF 工作成果并与安全目标边界对齐
  downstream_allocation:
    - sg_id: SG-WIPER-001
      allocation: FSC/FSR（待建）
      receiver: FSC-WIPER-001
      verification_method: 分析/评审/测试
      evidence_id: 待定
    - sg_id: SG-WIPER-002
      allocation: FSC/FSR（待建）
      receiver: FSC-WIPER-001
      verification_method: 分析/评审/测试
      evidence_id: 待定
