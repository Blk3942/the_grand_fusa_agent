      note: 路径示例 C:\Users\ASUS\Desktop\NOA简介.docx；功能简介与功能划分以受控库正式版为准
    - id: REG-GSS-L2-DRAFT
      name: 智能网联汽车 组合驾驶辅助系统安全要求（征求意见稿）及配套释义（如项目采用）
      version: 草案
      source: 法规/标准
      note: 条款引用需带版本与适用决议；不构成合规断言
  standard_requirements:
    - standard: ISO 26262
      part_clause: Part 3（Concept Phase）
      applicability: 相关项定义需支撑危害分析与安全概念输入
      evidence_ref: SYS-REV-NOA-ITEM-001（计划）
    - standard: GB/T 40429-2021
      part_clause: 驾驶自动化等级划分
      applicability: L2 级用户与系统角色、动态驾驶任务边界
      evidence_ref: 项目合规矩阵（待建）
    - standard: ISO 21448
