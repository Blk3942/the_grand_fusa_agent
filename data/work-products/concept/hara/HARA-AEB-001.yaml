base:
  purpose: 基于 AEB Item Definition，在概念阶段识别危害事件并进行风险评估（S/E/C），提出安全目标（SG）并形成向 FSC 的追溯输入。
  scope_boundary:
    system_function_boundary:
      - 覆盖 AEB 在其适用工况/ODD 内的典型运行场景与边界场景
      - 覆盖 malfunction 引发的危害事件；SOTIF 风险另行分析
    v_model_stage:
      - 概念
  inputs_references:
    - id: ITEM-AEB-001
      name: AEB Item Definition
      version: v1.0
      source: data/work-products/concept/item-definition/ITEM-AEB-001.yaml
      note: 单一真源
    - id: ODD-AEB-001
      name: AEB ODD/适用工况定义
      version: v0.1
      source: 系统需求/法规合规文档
      note: 待提供（影响 E/C 假设）
  standard_requirements:
    - standard: ISO 26262
      part_clause: Part 3（HARA）
      applicability: 危害识别、场景、危害事件、S/E/C 与安全目标
      evidence_ref: SYS-REV-AEB-HARA-001（计划）
  project_assumptions:
    - id: ASM-AEB-HARA-001
      assumption: 驾驶员在 AEB 触发前后保持基本驾驶能力；若系统告警/制动介入，驾驶员可通过踏板/转向进行合理干预（具体策略待定）
      impact: 可控性 C 的判定与误触发后果
      risk_if_invalid: C 低估导致 ASIL 低估
      verification: 驾驶员研究/试验数据与 HMI 设计确认
  traceability:
    - item_id: HARA-AEB-001
      upstream: ITEM-AEB-001
      downstream: FSC-AEB-001（待建）
      verification_method: 评审
      evidence_id: SYS-REV-AEB-HARA-001（计划）
  open_verification_items:
    - id: OVI-AEB-HARA-001
      item: S/E/C 标定所需的场景统计（速度分布、道路类型、目标类型）与驾驶员可控性数据
      owner: 待定
      due: 待定
      status: Open
  review_approval:
    - role: 作者
      name: 系统安全工程师（待定）
      conclusion: N/A
      date: 2026-03-27
    - role: 评审者
      name: 功能安全工程师（待定）
      conclusion: 待填写
      date: 待填写
    - role: 批准者
      name: 功能安全经理（待定）
      conclusion: 待填写
      date: 待填写
  change_history:
    - version: v0.1
      date: 2026-03-27
      summary: 创建 AEB HARA 草案
      reason: 概念阶段初始化
      author: AI Assistant
  notes_boundary:
    - 本 HARA 为草案：S/E/C 与 ASIL 定级高度依赖 ODD 与驾驶员可控性假设，需项目数据验证后冻结。

content:
  analysis_scope:
    related_item: ITEM-AEB-001
    included_boundary:
      - AEB 触发判定与对制动系统的制动请求输出
      - 误触发抑制与驾驶员介入/退出策略（概念层面）
    excluded_boundary:
      - 制动执行闭环控制算法细节
      - 非 malfunction 风险（SOTIF）与法规评测结论
  hazards_and_events:
    - he_id: HE-AEB-001
      scenario: 城市道路跟车，前车急刹
      malfunction: 风险评估低估或目标漏检导致 AEB 未触发/触发过晚
      hazard_event: 与前车追尾碰撞
      consequence: 乘员伤害与财产损失
    - he_id: HE-AEB-002
      scenario: 高速跟车/切入，后车距离较近
      malfunction: 误检/误判导致 AEB 误触发强制制动
      hazard_event: 后车追尾或引发多车连环事故
      consequence: 乘员伤害与二次事故风险
    - he_id: HE-AEB-003
      scenario: 行人横穿/两轮车切入（若支持 VRU）
      malfunction: 目标分类/跟踪错误导致未触发或触发不当
      hazard_event: 与弱势交通参与者碰撞
      consequence: 严重伤害/致命风险
    - he_id: HE-AEB-004
      scenario: 低附着/弯道/坡道，制动能力受限
      malfunction: 未正确识别制动能力边界或未按策略降级/告警，导致减速度不足
      hazard_event: 碰撞不可避免或碰撞减轻不足
      consequence: 伤害风险与失控风险
  risk_assessment:
    - he_id: HE-AEB-001
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 需结合速度分布、车距统计与驾驶员反应/介入能力假设确定
    - he_id: HE-AEB-002
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 需结合高速暴露度与后车典型跟车行为统计确定
    - he_id: HE-AEB-003
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 目标类型覆盖与场景暴露度需项目确认；通常严重度较高
    - he_id: HE-AEB-004
      s: 待定
      e: 待定
      c: 待定
      asil: 待定
      rationale: 低附着与曲率对制动与感知影响需通过测试数据界定
  safety_goals:
    - sg_id: SG-AEB-001
      description: 系统应在可避免/可减轻碰撞的工况下及时触发 AEB 或采取等效策略，以避免或减轻与前车的追尾碰撞。
      source_he_id: HE-AEB-001
      asil: 待定
      safe_state: AEB 正确触发并建立制动；若不可用则明确告警并禁止激活/提示驾驶员（待定）
    - sg_id: SG-AEB-002
      description: 系统应避免无正当碰撞风险时的 AEB 误触发；若发生误触发，应确保驾驶员可通过介入抑制/退出并保持车辆可控。
      source_he_id: HE-AEB-002
      asil: 待定
      safe_state: 退出 AEB 并释放制动请求，提示驾驶员接管（待定）
    - sg_id: SG-AEB-003
      description: 对于目标类型覆盖范围内的 VRU（若适用），系统应在能力范围内及时识别并采取制动缓解，避免或降低碰撞严重度。
      source_he_id: HE-AEB-003
      asil: 待定
      safe_state: AEB 触发并建立制动；能力不足时告警/抑制并提示驾驶员（待定）
    - sg_id: SG-AEB-004
      description: 当制动能力或感知能力不足（如低附着/弯道/坡道）时，系统应检测边界并采取降级/退出与告警，避免输出不可信触发行为。
      source_he_id: HE-AEB-004
      asil: 待定
      safe_state: 限制功能并提示驾驶员，必要时退出 AEB（待定）
  assumptions_limits:
    - type: 假设
      id: ASM-AEB-HARA-001
      content: 驾驶员可在误触发后通过介入恢复控制
      impact: 影响可控性 C 判定
    - type: 限制
      id: LIM-AEB-HARA-001
      content: HARA 仅覆盖 malfunction 引发的危害事件；SOTIF 风险另行分析
      impact: 需建立对应 SOTIF 工作成果
  downstream_allocation:
    - sg_id: SG-AEB-001
      allocation: FSC/FSR（待建）
      receiver: FSC-AEB-001
      verification_method: 分析/评审/测试
      evidence_id: 待定
    - sg_id: SG-AEB-002
      allocation: FSC/FSR（待建）
      receiver: FSC-AEB-001
      verification_method: 分析/评审/测试
      evidence_id: 待定
