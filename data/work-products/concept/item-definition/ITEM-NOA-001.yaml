content:
  item_overview:
    item_name: NOA（导航辅助驾驶/领航辅助）
    functional_objective: 在限定 ODD 内，根据导航路线与环境感知输出纵向/横向辅助驾驶控制请求（或轨迹目标），并在边界条件触发时提示驾驶员接管或执行安全降级/退出。
    non_safety_objectives:
      - 提升路线跟随与车道保持舒适性
      - 减少不必要的告警与突兀控制
      - 提升通行效率（在合规前提下）
  boundary_interfaces:
    in_scope:
      - 导航路线与道路拓扑利用（地图/定位输入）
      - 环境感知融合后的车道/目标/限速等要素使用
      - 轨迹/速度规划（或策略请求）与 NOA 状态机
      - 退出/降级/接管提示逻辑
      - 向执行/底盘控制或域控输出控制请求/轨迹目标/状态
    out_of_scope:
      - 低层执行控制闭环（转向/制动/动力执行器具体控制算法，若由底盘域负责）
      - 驾驶员身份识别与舒适性娱乐功能
      - 远程云控驾驶行为
    interfaces:
      - id: IF-NOA-001
        object: 导航/地图/定位模块
        direction: 输入
        signal: 路线、道路拓扑、定位质量、限速/匝道信息（如适用）
        normal_range: 定位与地图匹配质量满足 NOA 最小要求
        abnormal_handling: 定位/地图质量不足时抑制 NOA 或降级
      - id: IF-NOA-002
        object: 感知系统（摄像头/雷达/激光雷达等，按项目）
        direction: 输入
        signal: 车道线/边界、目标车辆/障碍物、交通标志/限速（如适用）
        normal_range: 输出周期与置信度满足规划需求
        abnormal_handling: 置信度不足时限制功能并提示驾驶员接管
      - id: IF-NOA-003
        object: 车辆状态总线（CAN/Ethernet）
        direction: 输入
        signal: 车速、加速度、转角、档位、制动状态、转向灯、雨刮等
        normal_range: 信号有效且时延满足控制链路
        abnormal_handling: 关键状态信号失效触发降级/退出
      - id: IF-NOA-004
        object: 执行/底盘控制或域控
        direction: 输出
        signal: 轨迹目标/加速度目标/车道变更请求/功能状态与有效位
        normal_range: 下游确认接收并执行，反馈闭环（如有）
        abnormal_handling: 通信超时或拒绝执行时进入安全降级并告警
      - id: IF-NOA-005
        object: HMI
        direction: 输出
        signal: 激活/可用/退出/接管告警、原因码、等级
        normal_range: 告警通路可用且优先级正确
        abnormal_handling: HMI 不可用时禁止激活或强制退出
  operating_scenarios:
    - id: SCN-NOA-001
      description: 高速主路巡航与车道保持
      conditions: 高速道路，良好天气，车道线清晰，速度 60-120 km/h（以 ODD 为准）
      driver_state: 正常驾驶，可随时接管
      note: 基线场景
    - id: SCN-NOA-002
      description: 匝道分合流与道路拓扑变化
      conditions: 高速匝道/分流口，交通流变化
      driver_state: 注意力可能分散，需要提示关注
      note: 关键场景
    - id: SCN-NOA-003
      description: 施工区/临时标线导致车道边界不稳定
      conditions: 施工区、锥桶、临时标线，车道线不清晰
      driver_state: 需要及时接管
      note: ODD 边界/降级触发场景
    - id: SCN-NOA-004
      description: 低能见度（雨雾夜间）感知能力下降
      conditions: 大雨/雾/夜间逆光，感知置信度下降
      driver_state: 需要及时接管
      note: 降级/退出策略关键场景
  dependencies_constraints:
    - id: DEP-NOA-001
      dependency: ODD 识别与约束机制
      constraint: 能识别道路类型/天气/速度等关键边界并限制激活
      impact_if_failed: ODD 超界导致风险不可控
    - id: DEP-NOA-002
      dependency: 驾驶员告警与接管链路
      constraint: 告警可达且可理解，接管检测可靠
      impact_if_failed: 可控性下降，接管失败
    - id: DEP-NOA-003
      dependency: 感知与定位性能
      constraint: 关键要素检测率/误检率/时延满足最小性能
      impact_if_failed: 轨迹规划偏差、碰撞风险上升
    - id: DEP-NOA-004
      dependency: 车辆执行系统接口
      constraint: 输出请求的时序/有效位/拒绝原因反馈明确
      impact_if_failed: 失配导致突兀控制或无法安全退出
  known_failures_initial_concerns:
    - id: CON-NOA-001
      concern: 规划输出异常导致车辆偏离车道或与目标车碰撞
      source: 经验/评审
      severity_preliminary: 待定
      downstream: 输入 HARA 危害事件
    - id: CON-NOA-002
      concern: 应退出/降级但未退出，驾驶员未及时接管
      source: 评审
      severity_preliminary: 待定
      downstream: 输入 HARA（可控性假设）
    - id: CON-NOA-003
      concern: 误退出/误告警导致驾驶员困惑或误操作
      source: 人机评审
      severity_preliminary: 待定
      downstream: 输入 HARA 与 SOTIF 补充
