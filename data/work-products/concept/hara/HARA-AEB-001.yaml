meta:
  doc_id: HARA-AEB-001
  title: AEB（自动紧急制动）HARA（危害分析与风险评估）
  work_product_type: hara
  iso_ref:
    - ISO 26262-3
  asil: 待定
  status: Draft
  owner: 系统安全团队（待定）
  reviewers: []
